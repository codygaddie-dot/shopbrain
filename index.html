<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0000">
<title>ShopBrain</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a19;height:100vh;height:100dvh;display:flex;flex-direction:column;overscroll-behavior:none}
.app-header{display:flex;align-items:center;gap:10px;padding:6px 14px;background:#1a1a19;border-bottom:2px solid #E8000D;flex-shrink:0}
.app-logo{height:36px;object-fit:contain}
.app-title{color:#fff;font-size:13px;font-weight:600;letter-spacing:.02em;line-height:1.2}
.app-title span{display:block;font-size:10px;color:#888;font-weight:400}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1a19;border-top:1px solid #333;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bn-inner{display:flex;justify-content:space-around;padding:4px 0}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;cursor:pointer;color:#888;border:none;background:none;font-size:9px;letter-spacing:.03em;text-transform:uppercase;min-width:52px;border-radius:8px}
.bn-item:active{background:#333}
.bn-item.on{color:#E8000D}
.bn-item .bn-icon{font-size:20px;line-height:1}
@media(max-width:700px){
  .bottom-nav{display:block}
  .wrap{height:calc(100dvh - 56px - 56px - env(safe-area-inset-bottom))}
  .sb{display:none}
  .main{width:100%}
  .app-header{padding:6px 12px}
  .app-logo{height:30px}
}
.wrap{display:flex;height:calc(100dvh - 56px);overflow:hidden}
.sb{width:210px;min-width:210px;border-right:1px solid #e0dfd8;display:flex;flex-direction:column;background:#f0efe8}
.sbh{padding:10px 12px;border-bottom:1px solid #e0dfd8}
.sbh p{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em}
.sbi{width:100%;padding:7px 9px;font-size:14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a19;margin-top:7px;outline:none}
.sbi:focus{border-color:#E8000D;box-shadow:0 0 0 2px rgba(232,0,13,.15)}
.mlist{flex:1;overflow-y:auto}
.mi{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e8e7e0}
.mi:hover{background:#e8e7e0}
.mi.on{background:#fff;border-left:3px solid #E8000D}
.mi.on .mn{color:#C0000A;font-weight:600}
.smi{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;border-bottom:1px solid #ddd;background:#f0efe8}
.smi:hover{background:#e8e7e0}
.smi.on{background:#fff;border-left:3px solid #BA7517}
.smi.on span{color:#854F0B;font-weight:600}
.sdot{width:8px;height:8px;border-radius:50%;background:#BA7517;flex-shrink:0}
.ds{display:flex;gap:3px}
.nd{width:6px;height:6px;border-radius:50%;background:#378ADD}
.gd{width:6px;height:6px;border-radius:50%;background:#639922}
.cd{width:6px;height:6px;border-radius:50%;background:#BA7517}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fff}
.mhd{padding:10px 16px;border-bottom:1px solid #e8e7e0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:42px;background:#fafaf8}
.mht{font-size:15px;font-weight:600;flex:1}
.pill{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600}
.pg{background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97}
.pa{background:#FAEEDA;color:#854F0B;border:1px solid #FAC775}
.tbar{display:flex;gap:1px;padding:7px 16px 0;border-bottom:1px solid #e8e7e0;background:#f5f5f3;overflow-x:auto;flex-shrink:0}
.tab{padding:8px 12px;font-size:12px;cursor:pointer;border-radius:8px 8px 0 0;color:#666;border:1px solid transparent;white-space:nowrap}
.tab.on{background:#fff;border-color:#e0dfd8;border-bottom-color:#fff;color:#C0000A;font-weight:600;margin-bottom:-1px}
.tab:hover:not(.on){background:#ebe9e0}
.bd{flex:1;overflow-y:auto;padding:14px 16px}
.ph{color:#aaa;font-size:14px;text-align:center;padding:60px 20px}
.mc{border:1px solid #e0dfd8;border-radius:10px;overflow:hidden;margin-bottom:8px}
.mch{padding:9px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#f5f5f3;gap:8px}
.mch:hover{background:#ebe9e0}
.mcn{font-size:13px;font-weight:600}
.bb{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600}
.bbl{background:#FFF0F0;color:#C0000A}
.bba{background:#FAEEDA;color:#854F0B}
.bbg{background:#EAF3DE;color:#3B6D11}
.chv{font-size:10px;color:#aaa;transition:transform .2s;flex-shrink:0}
.chv.op{transform:rotate(90deg)}
.mcbd{padding:12px 13px;background:#fff;border-top:1px solid #e8e7e0}
.itabs{display:flex;gap:4px;margin-bottom:9px;flex-wrap:wrap}
.it{padding:7px 12px;font-size:12px;cursor:pointer;border-radius:100px;border:1px solid #ccc;color:#666;background:#f5f5f3}
.it.on{background:#FFF0F0;border-color:#F5AAAA;color:#C0000A;font-weight:600}
.it:hover:not(.on){background:#ebe9e0}
textarea{width:100%;min-height:75px;padding:8px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#f9f9f7;color:#1a1a19;resize:vertical;font-family:inherit;line-height:1.5}
textarea:focus{outline:none;border-color:#E8000D;box-shadow:0 0 0 2px rgba(232,0,13,.12)}
input[type=text],input[type=number],input[type=date],select{padding:6px 9px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#f9f9f7;color:#1a1a19;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#E8000D;box-shadow:0 0 0 2px rgba(232,0,13,.12)}
.btn{padding:8px 14px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#f5f5f3;color:#1a1a19;cursor:pointer;margin-top:7px}
.btn:hover{background:#FFF0F0;border-color:#F5AAAA;color:#C0000A}
.btn.sv{background:#EAF3DE;border-color:#97C459;color:#3B6D11}
.btn.am{border-color:#FAC775;color:#854F0B;background:#FAEEDA}
.btn.am:hover{background:#FAC775}
.sl{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.dnc{border:1px solid #C0DD97;border-radius:9px;padding:10px 12px;background:#EAF3DE;margin-bottom:8px}
.dnt{font-size:12px;font-weight:600;color:#3B6D11;margin-bottom:4px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.dnb{font-size:13px;color:#1a1a19;line-height:1.55;white-space:pre-wrap}
.dna{font-size:11px;color:#3B6D11;text-decoration:none;flex-shrink:0}
.dna:hover{text-decoration:underline}
.dfr{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid #e0dfd8;border-radius:9px;background:#f5f5f3;margin-bottom:6px}
.dfl{font-size:11px;color:#C0000A;text-decoration:none;padding:3px 9px;border:1px solid #F5AAAA;border-radius:8px;background:#FFF0F0;white-space:nowrap}
.dfl:hover{background:#F5AAAA}
.clc{border:1px solid #FAC775;border-radius:9px;padding:10px 12px;background:#FAEEDA;margin-bottom:8px}
.clt{font-size:12px;font-weight:600;color:#854F0B;margin-bottom:4px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.clb{font-size:13px;color:#1a1a19;line-height:1.55;white-space:pre-wrap}
.cla{font-size:11px;color:#854F0B;text-decoration:none;flex-shrink:0}
.cla:hover{text-decoration:underline}
.ttag{font-size:10px;padding:2px 7px;border-radius:100px;background:#FAC775;color:#633806;font-weight:600;display:inline-block;margin-bottom:5px}
.kc{border:1px solid #e0dfd8;border-radius:9px;padding:9px 11px;background:#f5f5f3;position:relative;margin-bottom:6px}
.kl{font-size:10px;color:#888;margin-bottom:3px;font-weight:600;text-transform:uppercase}
.kv{font-family:'Courier New',monospace;font-size:12px;background:#fff;padding:6px 8px;border-radius:8px;border:1px solid #ddd;cursor:pointer;user-select:all;color:#1a1a19;word-break:break-all}
.kv:hover{background:#E6F1FB}
.xb{position:absolute;top:8px;right:9px;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:8px;border:1px solid transparent;color:#888}
.xb:hover{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.af{border:1px dashed #ccc;border-radius:9px;padding:10px 12px;margin-top:4px}
.af input{width:100%;margin-bottom:6px}
.ktrow{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.ktb{padding:3px 9px;font-size:11px;border:1px solid #ccc;border-radius:100px;cursor:pointer;background:#f5f5f3;color:#666}
.ktb.on{background:#E6F1FB;border-color:#B5D4F4;color:#185FA5;font-weight:600}
.uz{border:2px dashed #ccc;border-radius:10px;padding:14px;text-align:center;cursor:pointer;margin-top:8px}
.uz:hover{background:#FFF0F0;border-color:#E8000D}
.uz p{font-size:13px;color:#666}
.uz span{font-size:11px;color:#aaa;display:block;margin-top:3px}
.fc{border:1px solid #e0dfd8;border-radius:9px;padding:8px 11px;background:#f5f5f3;display:flex;align-items:center;gap:9px;margin-bottom:6px}
.fn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fz{font-size:11px;color:#888}
.fb{padding:3px 9px;font-size:11px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#666;cursor:pointer}
.fb:hover{background:#FFF0F0;color:#C0000A;border-color:#F5AAAA}
.fb.dx:hover{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.ar{display:flex;gap:8px;margin-bottom:12px}
.ai{flex:1;padding:6px 9px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#f5f5f3;color:#1a1a19}
.ai:focus{outline:none;border-color:#378ADD}
.ab{padding:6px 12px;font-size:13px;border:1px solid #F5AAAA;border-radius:8px;background:#FFF0F0;color:#C0000A;cursor:pointer;font-weight:600;white-space:nowrap}
.ab:hover{background:#F5AAAA}
.dv{height:1px;background:#e8e7e0;margin:9px 0}
.scard{border:1px solid #e0dfd8;border-radius:10px;padding:11px 13px;margin-bottom:9px;position:relative;background:#f9f9f7}
.scard.sa{border-color:#97C459;background:#EAF3DE}
.scard.sx{border-color:#FAC775;background:#FAEEDA}
.scard.se{border-color:#F7C1C1;background:#FCEBEB}
.sname{font-size:14px;font-weight:600;margin-bottom:3px}
.smeta{font-size:12px;color:#666;margin-bottom:2px}
.sst{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600;display:inline-block}
.sst.a{background:#C0DD97;color:#27500A}
.sst.x{background:#FAC775;color:#633806}
.sst.e{background:#F7C1C1;color:#791F1F}
.sst.u{background:#D3D1C7;color:#444}
.ctag{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600;display:inline-block;margin-right:3px}
.csc{background:#FFF0F0;color:#C0000A}
.coe{background:#EAF3DE;color:#3B6D11}
.cpt{background:#FAEEDA;color:#854F0B}
.cdi{background:#EEEDFE;color:#3C3489}
.clk{background:#FBEAF0;color:#993556}
.csr{background:#E1F5EE;color:#0F6E56}
.crg{background:#EEEDFE;color:#534AB7}
.ccl{background:#E1F0FF;color:#0A4D8C}
.sform{border:1px solid #ccc;border-radius:10px;padding:13px;background:#f5f5f3;margin-bottom:13px}
.sform input,.sform select,.sform textarea{width:100%;margin-bottom:7px}
.frow{display:flex;gap:8px}
.frow input,.frow select{margin-bottom:7px}
.sumrow{display:flex;gap:8px;margin-bottom:13px}
.sumcard{flex:1;background:#f5f5f3;border-radius:9px;padding:9px 11px;text-align:center;border:1px solid #e8e7e0}
.sumnum{font-size:20px;font-weight:700}
.sumlbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.filtrow{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap}
.filt{padding:7px 12px;font-size:12px;border:1px solid #ccc;border-radius:100px;cursor:pointer;background:#f5f5f3;color:#666}
.filt.on{background:#FFF0F0;border-color:#F5AAAA;color:#C0000A;font-weight:600}
.sedit{position:absolute;top:9px;right:42px;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:8px;border:1px solid transparent;color:#888}
.sedit:hover{background:#FFF0F0;color:#C0000A;border-color:#F5AAAA}
.sdel{position:absolute;top:9px;right:10px;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:8px;border:1px solid transparent;color:#888}
.sdel:hover{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.surl{font-size:11px;color:#C0000A;text-decoration:none;display:block;margin-top:4px}
.surl:hover{text-decoration:underline}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#2a2a28;color:#f0efe8;font-size:12px;padding:7px 16px;border-radius:100px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.oemi{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;border-bottom:1px solid #ddd;background:#f0efe8}
.oemi:hover{background:#e8e7e0}
.oemi.on{background:#fff;border-left:3px solid #185FA5}
.eemi.on{background:#fff;border-left:3px solid #3C3489}
.eedot{width:8px;height:8px;border-radius:50%;background:#3C3489;flex-shrink:0}
.oemdot{width:8px;height:8px;border-radius:50%;background:#E8000D;flex-shrink:0}
.oemcard{border:1px solid #F5AAAA;border-radius:9px;padding:10px 12px;background:#FFF0F0;margin-bottom:8px}
.oemtitle{font-size:12px;font-weight:600;color:#C0000A;margin-bottom:4px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.oembody{font-size:13px;color:#1a1a19;line-height:1.5;white-space:pre-wrap}
.oemlink{font-size:11px;color:#C0000A;text-decoration:none;flex-shrink:0}
.oemlink:hover{text-decoration:underline}
.oemtag{font-size:10px;padding:2px 7px;border-radius:100px;background:#F5AAAA;color:#8B0000;font-weight:600;display:inline-block;margin-bottom:4px}
.eecard{border:1px solid #C4C1F5;border-radius:9px;padding:10px 12px;background:#EEEDFE;margin-bottom:8px}
.eetitle{font-size:12px;font-weight:600;color:#3C3489;margin-bottom:4px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.eebody{font-size:13px;color:#1a1a19;line-height:1.5;white-space:pre-wrap}
.eelink{font-size:11px;color:#3C3489;text-decoration:none;flex-shrink:0}
.eelink:hover{text-decoration:underline}
.oem-make-hdr{font-size:10px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px;border-bottom:1px solid #e0dfd8;padding-bottom:4px}
.oem-make-hdr:first-child{margin-top:0}
.lib-search-wrap{position:sticky;top:0;background:var(--bg,#fff);z-index:10;padding:0 0 10px}
.lib-search{width:100%;padding:11px 14px;font-size:15px;border:1.5px solid #ccc;border-radius:10px;background:#f9f9f7;color:#1a1a19;font-family:inherit}
.lib-search:focus{outline:none;border-color:#E8000D;box-shadow:0 0 0 3px rgba(232,0,13,.12)}
.lib-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.lib-filt{padding:7px 12px;font-size:12px;border:1px solid #ccc;border-radius:100px;cursor:pointer;background:#f5f5f3;color:#666;white-space:nowrap}
.lib-filt.on{background:#FFF0F0;border-color:#F5AAAA;color:#C0000A;font-weight:600}
.lib-count{font-size:11px;color:#888;margin-bottom:8px}
.lib-item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border:1px solid #e0dfd8;border-radius:9px;background:#f9f9f7;margin-bottom:6px;cursor:pointer;text-decoration:none;color:inherit}
.lib-item:hover{background:#FFF0F0;border-color:#F5AAAA}
.lib-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.lib-body{flex:1;min-width:0}
.lib-name{font-size:13px;font-weight:600;color:#1a1a19;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-meta{font-size:11px;color:#888;display:flex;gap:6px;flex-wrap:wrap}
.lib-tag{font-size:10px;padding:1px 6px;border-radius:100px;font-weight:600;display:inline-block}
.lt-make{background:#E6F1FB;color:#185FA5}
.lt-prog{background:#FAEEDA;color:#854F0B}
.lt-keys{background:#EAF3DE;color:#3B6D11}
.lt-diag{background:#EEEDFE;color:#3C3489}
.lt-trans{background:#FDE8F5;color:#7B1A6D}
.lt-eeprom{background:#C4C1F5;color:#2A237A}
.lt-oem{background:#FFF0F0;color:#8B0000}
.lt-tool{background:#FAF0DA;color:#6B4B00}
.lt-general{background:#F1EFE8;color:#555}
.lt-case{background:#FFE4E1;color:#8B1A1A}
.lib-section-hdr{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px;border-bottom:1px solid #e0dfd8;padding-bottom:4px}
.lib-section-hdr:first-child{margin-top:0}

/* ── VEHICLE SEARCH ── */
.vsearch-wrap{position:sticky;top:0;background:#fff;z-index:10;padding-bottom:10px}
.vsearch-input{width:100%;padding:12px 16px;font-size:16px;border:2px solid #E8000D;border-radius:12px;background:#f9f9f7;color:#1a1a19;font-family:inherit;outline:none;box-shadow:0 0 0 3px rgba(232,0,13,.12)}
.vsearch-input:focus{box-shadow:0 0 0 4px rgba(55,138,221,.18)}
.vsearch-results{margin-top:4px}
.vsearch-result{border:1px solid #e0dfd8;border-radius:9px;padding:10px 13px;background:#f9f9f7;margin-bottom:6px;cursor:pointer}
.vsearch-result:hover{background:#FFF0F0;border-color:#F5AAAA}
.vsr-make{font-size:11px;font-weight:600;color:#C0000A;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.vsr-model{font-size:14px;font-weight:600;color:#1a1a19;margin-bottom:3px}
.vsr-snippet{font-size:12px;color:#666;line-height:1.45;white-space:pre-wrap}
.vsr-tag{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600;display:inline-block;margin-right:4px;margin-bottom:3px}
.vsr-prog{background:#FAEEDA;color:#854F0B}
.vsr-diag{background:#EEEDFE;color:#3C3489}
.vsr-keys{background:#EAF3DE;color:#3B6D11}
.vsr-gen{background:#F1EFE8;color:#555}
.vsr-clone{background:#FFE4E1;color:#8B1A1A}
.vsr-drive{background:#FFF0F0;color:#8B0000}
.vsearch-empty{font-size:14px;color:#aaa;text-align:center;padding:40px 20px}
.vsearch-hint{font-size:12px;color:#aaa;text-align:center;padding:20px}

/* ── VOICE RECORDER ── */
.voice-panel{padding:0}
.voice-hero{background:linear-gradient(135deg,#1a1a19 0%,#2a3a4a 100%);border-radius:12px;padding:20px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.voice-hero::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(55,138,221,.2) 0%,transparent 70%);pointer-events:none}
.voice-title{color:#fff;font-size:16px;font-weight:600;margin-bottom:4px}
.voice-sub{color:#888;font-size:12px;margin-bottom:16px}
.voice-btn{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .2s;position:relative}
.voice-btn.idle{background:#E8000D;box-shadow:0 0 0 8px rgba(232,0,13,.2)}
.voice-btn.idle:hover{background:#A0000A;transform:scale(1.05)}
.voice-btn.recording{background:#E53E3E;box-shadow:0 0 0 8px rgba(229,62,62,.2),0 0 0 16px rgba(229,62,62,.1);animation:pulse-rec 1.5s ease-in-out infinite}
.voice-btn.processing{background:#BA7517;box-shadow:0 0 0 8px rgba(186,117,23,.2);animation:spin-border 1s linear infinite}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 0 8px rgba(229,62,62,.2),0 0 0 16px rgba(229,62,62,.1)}50%{box-shadow:0 0 0 12px rgba(229,62,62,.3),0 0 0 22px rgba(229,62,62,.08)}}
@keyframes spin-border{0%{box-shadow:0 0 0 8px rgba(186,117,23,.4)}100%{box-shadow:0 0 0 12px rgba(186,117,23,.1)}}
.voice-status{color:#aaa;font-size:12px;margin-top:10px;min-height:18px}
.voice-timer{color:#fff;font-size:22px;font-weight:700;font-family:monospace;margin-top:6px;min-height:28px}
.voice-waveform{height:32px;display:flex;align-items:center;justify-content:center;gap:3px;margin-top:8px;min-height:40px}
.voice-bar{width:4px;background:#E8000D;border-radius:2px;transition:height .1s}
.voice-target{border:1px solid #e0dfd8;border-radius:10px;padding:13px;margin-bottom:12px;background:#f9f9f7}
.vt-label{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.vt-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.vt-sel{flex:1;min-width:120px;padding:7px 9px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a19}
.vt-sel:focus{outline:none;border-color:#378ADD}
.vt-note-type{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.vt-nt{padding:5px 10px;font-size:11px;border:1px solid #ccc;border-radius:100px;cursor:pointer;background:#f5f5f3;color:#666}
.vt-nt.on{background:#E6F1FB;border-color:#B5D4F4;color:#185FA5;font-weight:600}
.voice-transcript{border:1px solid #ccc;border-radius:9px;padding:10px;background:#fff;margin-bottom:10px}
.vt-header{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.vt-text{font-size:13px;color:#1a1a19;line-height:1.6;min-height:60px;white-space:pre-wrap}
.vt-text[contenteditable]{outline:none;cursor:text}
.vt-text[contenteditable]:focus{background:#fafaf8}
.voice-actions{display:flex;gap:8px;flex-wrap:wrap}
.voice-save-btn{padding:9px 18px;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;background:#E8000D;color:#fff}
.voice-save-btn:hover{background:#A0000A}
.voice-save-btn:disabled{background:#ccc;cursor:not-allowed}
.voice-clear-btn{padding:9px 14px;font-size:13px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#f5f5f3;color:#666}
.voice-clear-btn:hover{background:#FCEBEB;border-color:#F7C1C1;color:#A32D2D}
.voice-history{margin-top:14px}
.vh-header{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;border-bottom:1px solid #e0dfd8;padding-bottom:4px}
.vh-item{border:1px solid #e0dfd8;border-radius:9px;padding:9px 12px;background:#f9f9f7;margin-bottom:6px;position:relative}
.vh-item:hover{border-color:#B5D4F4}
.vh-make{font-size:10px;font-weight:600;color:#185FA5;text-transform:uppercase;letter-spacing:.04em}
.vh-model{font-size:13px;font-weight:600;color:#1a1a19}
.vh-text{font-size:12px;color:#555;line-height:1.45;margin-top:3px;white-space:pre-wrap;max-height:60px;overflow:hidden}
.vh-meta{font-size:10px;color:#aaa;margin-top:4px}
.vh-del{position:absolute;top:8px;right:8px;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:6px;border:1px solid transparent;color:#aaa}
.vh-del:hover{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.no-speech-msg{border:1px solid #FAC775;background:#FAEEDA;border-radius:9px;padding:12px;font-size:13px;color:#854F0B;margin-bottom:12px;line-height:1.5}

/* Search highlight */
.search-hl{background:#fff3a8;border-radius:2px;padding:0 1px}

/* ── OEM INSTALL TAB ── */
.install-hero{background:linear-gradient(135deg,#1a0000 0%,#2d0000 100%);border-radius:12px;padding:14px 16px;margin-bottom:14px;border-left:4px solid #E8000D}
.install-hero-title{color:#fff;font-size:15px;font-weight:700;margin-bottom:3px}
.install-hero-sub{color:#6a9fc0;font-size:12px}
.install-make-hdr{font-size:11px;font-weight:700;color:#185FA5;text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px;padding:6px 10px;background:#E6F1FB;border-radius:8px;border-left:3px solid #E8000D}
.install-make-hdr:first-of-type{margin-top:0}
.install-card{border:1px solid #e0dfd8;border-radius:10px;overflow:hidden;margin-bottom:8px;background:#fff}
.install-card-hdr{padding:10px 13px;background:#f5f5f3;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid transparent}
.install-card-hdr:hover{background:#ebe9e0}
.install-card.open .install-card-hdr{border-bottom-color:#e0dfd8;background:#FFF0F0}
.install-card-title{font-size:13px;font-weight:600;color:#1a1a19;display:flex;align-items:center;gap:7px}
.install-card-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.install-badge{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:600;white-space:nowrap}
.ib-setup{background:#E6F1FB;color:#0D3F72}
.ib-install{background:#EAF3DE;color:#27500A}
.ib-config{background:#FAEEDA;color:#633806}
.ib-license{background:#FBEAF0;color:#993556}
.ib-troubleshoot{background:#EEEDFE;color:#3C3489}
.ib-update{background:#E1F5EE;color:#0F6E56}
.install-card-body{padding:13px}
.install-step-list{list-style:none;margin:0;padding:0}
.install-step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.install-step:last-child{margin-bottom:0}
.install-step-num{width:22px;height:22px;border-radius:50%;background:#E8000D;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.install-step-text{font-size:13px;color:#1a1a19;line-height:1.55;flex:1}
.install-step-text code{font-family:'Courier New',monospace;font-size:12px;background:#f0efe8;padding:1px 5px;border-radius:4px;color:#854F0B}
.install-note{border-left:3px solid #FAC775;background:#FAEEDA;border-radius:0 8px 8px 0;padding:8px 11px;font-size:12px;color:#633806;line-height:1.5;margin:8px 0}
.install-warning{border-left:3px solid #F7C1C1;background:#FCEBEB;border-radius:0 8px 8px 0;padding:8px 11px;font-size:12px;color:#791F1F;line-height:1.5;margin:8px 0}
.install-tip{border-left:3px solid #C0DD97;background:#EAF3DE;border-radius:0 8px 8px 0;padding:8px 11px;font-size:12px;color:#27500A;line-height:1.5;margin:8px 0}
.install-link-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;padding-top:8px;border-top:1px solid #e8e7e0}
.install-link{font-size:11px;color:#C0000A;text-decoration:none;padding:4px 10px;border:1px solid #F5AAAA;border-radius:8px;background:#FFF0F0;display:flex;align-items:center;gap:4px}
.install-link:hover{background:#F5AAAA}
.install-prereq{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.install-prereq-chip{font-size:11px;padding:3px 8px;border-radius:6px;background:#f0efe8;color:#555;border:1px solid #e0dfd8}
.install-user-section{margin-top:12px;padding-top:10px;border-top:1px solid #e8e7e0}
.install-expand-arrow{font-size:11px;color:#aaa;transition:transform .2s}
.install-card.open .install-expand-arrow{transform:rotate(90deg)}

/* ── Inline Doc Viewer ── */
.doc-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}
.doc-modal{background:#fff;border-radius:14px;width:100%;max-width:900px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
.doc-modal-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e0dfd8;background:#1a1a19;}
.doc-modal-title{color:#fff;font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.doc-modal-actions{display:flex;gap:8px;flex-shrink:0;}
.doc-modal-close{background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
.doc-modal-close:hover{color:#fff;}
.doc-modal-body{flex:1;overflow:hidden;}
.doc-modal-body iframe{width:100%;height:100%;border:none;min-height:60vh;}
.view-inline-btn{font-size:11px;color:#378ADD;text-decoration:none;padding:3px 9px;border:1px solid #378ADD44;border-radius:8px;background:#EBF4FF;white-space:nowrap;cursor:pointer;margin-right:4px;}
.view-inline-btn:hover{background:#378ADD;color:#fff;}
</style>

const CD={"Chevrolet":[{t:"E37 PCM cloning",tool:"IO Terminal / Flex / SPS",b:"E37 when cloning doesn't write slave chip.\n\nNeed to use SPS to finish after cloning.\n\nVehicle won't start after cloning. Must program with SPS then will start. No need for CKP learning or security with cloning.",u:"https://docs.google.com/document/d/1QJAN-_AR1Ax87fOXjlfr4rLoeFgYBk_4VOicbnBeJ5Y/edit"},{t:"PCM/ECM 2004-2013 non-Global A",tool:"TLC",b:"Most used modules can be done with normal programming methods. Service number must match on the tag on the module.\n\nONLY NON GLOBAL A VEHICLES.\n\nOn 2010-2014 year vehicles a used module can be taken out of a Global A vehicle or vice versa but will require cloning.",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"},{t:"PCM/ECM Global A (2011+)",tool:"IO Terminal",b:"TLC will only work with new on most of these modules. Must have original in most cases.",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"},{t:"TCM 2013+ Global A (8/9/10 speed)",tool:"IO Terminal",b:"Global A require OG module and cloning.\n\n8, 9, and 10 speed transmissions require a code on a tag found on the trans. If missing: pull the pan to access valve body.\n\nNEW 8 speed valve bodies have the number stamped on the bag - most shops throw this away.\n\nSTRONGLY RECOMMEND FASTLEARN after programming. Trans has to be 175F and full of fluid.",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"},{t:"BCM 2010+ Global A",tool:"IO Terminal / Flex",b:"Require cloning and original module. GLOBAL A ONLY. Needs all keys present.\n\n2020 Blazer: up to 2 hours.\n2015 City Express is a Nissan - needs new keys.\n2019+ GM TRUCK KEYS: 2-4 HOURS TO PROGRAM.",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"},{t:"BCM 2004-2013 non-Global A",tool:"SPS / EEPROM",b:"Most USED units via SPS. If trouble: 8 leg EEPROM can be copied to donor.\n\n2010 Buick LaCrosse, Chevy Cobalt, HHR, G6 need bench for used.\nPontiac GTO - ask Sean before quoting.",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"},{t:"IPC 2010+ Global A",tool:"IO Terminal",b:"Require cloning and original module. GLOBAL A ONLY.",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"},{t:"EBCM 2010+ Global A",tool:"IO Terminal / Flex",b:"Attempt TLC first - it may work. GLOBAL A ONLY.\n\n2019 Silverado: prepare for removal step pulls data from OG module. Without it, calibration and bleed are time consuming.",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"}],"GMC":[{t:"TCM Global A - 8/9/10 speed",tool:"IO Terminal",b:"Global A require OG module and cloning.\n\n8, 9, 10 speed - code on tag on trans. If missing: pull the pan.\n\nNEW 8 speed valve bodies have number on bag - shops throw it away.\n\nSTRONGLY RECOMMEND FASTLEARN (175F, full of fluid).",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"},{t:"BCM Global A",tool:"IO Terminal",b:"Cloning + original module + all keys.\n2019+ truck keys: 2-4 hours.",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"}],"Cadillac":[{t:"BCM Global A - 2-hour key programming",tool:"IO Terminal",b:"Cloning + original module + all keys.\n\n21-24+ Tahoe/Yukon/Escalade requires 2 hour key programming. Also for BCM replacement.",u:"https://docs.google.com/document/d/1OrpC-LbhgBh-C3quxT80xH37r473zj7mfN7eg3k_v7E/edit"}],"Buick":[{t:"BCM non-Global A - 8-leg EEPROM",tool:"SPS / EEPROM",b:"Most USED via SPS. If trouble: 8 leg EEPROM copied to donor.\n\n2010 LaCrosse needs bench for used.",u:"https://drive.google.com/file/d/1bF0NW0n4T5-VJ7375QQgG2ByWKVSFCis/view"}],"Dodge":[{t:"Used RWD/AWD 8HP45 programming",tool:"Flex - cable 2.22",b:"8 speed transmission.\n\nUse Flex to clone TCM:\n- Use Flex cable 2.22\n- Connect to original TCM\n- Read full backup\n- Disconnect software/hardware\n- Hook to donor transmission\n- Write full backup\n- Check calibration info in TCM and compare to Chrysler PDF\n- Clear transmission adaptives with scan tool\n\nIf calibration is incorrect:\n- Use CDA6 to change to correct calibration",u:"https://docs.google.com/document/d/1LPfHcCDX5nqdunAhY-SmThJkLKa-hnO43BCxpYWk7NQ/edit"},{t:"CDA 6.13 - FCA module cloning",tool:"CDA 6.13",b:"Physical Cloning = bit-level memory dump via bench tools.\nLogical Cloning = Identity and Configuration Migration via CDA (offline OBD-II).\n\nWARNING: CDA does NOT cover SGW vehicles.\nALWAYS SELECT OFFLINE MODE.\nDO NOT EVER UPDATE CDA.",u:"https://drive.google.com/file/d/1q4thCa9cMg5l0OGhiSCtU-0v8qGfv1SO/view"}],"Chrysler":[{t:"CDA 6.13 - FCA module cloning",tool:"CDA 6.13",b:"ALWAYS SELECT OFFLINE MODE WHEN LOGGING IN.\nDO NOT EVER UPDATE CDA.\nStop Node bat file x3 if CDA fails to start.\nNo ADAS with CDA. Does NOT cover SGW vehicles.",u:"https://drive.google.com/file/d/1q4thCa9cMg5l0OGhiSCtU-0v8qGfv1SO/view"}],"Jeep":[{t:"2020 Jeep Grand Cherokee 3.6 used trans",tool:"Flex",b:"- Select 8HP70 in Flex\n- Read and write\n- Check for later update using Witech2\n- Check for correct VIN and calibration",u:"https://docs.google.com/document/d/16oE0j0OX6HdeWe2XMikHNPYODdiEIW--ZkoPCWdtkjg/edit"},{t:"CDA 6.13 - Jeep FCA module cloning",tool:"CDA 6.13",b:"Same CDA 6.13 workflow for all Jeep FCA/Stellantis.\nALWAYS OFFLINE MODE. NEVER update CDA.",u:"https://drive.google.com/file/d/1q4thCa9cMg5l0OGhiSCtU-0v8qGfv1SO/view"}],"Ram":[{t:"Used RWD/AWD 8HP45 programming",tool:"Flex - cable 2.22",b:"8 speed transmission TCM clone via Flex cable 2.22.",u:"https://docs.google.com/document/d/1LPfHcCDX5nqdunAhY-SmThJkLKa-hnO43BCxpYWk7NQ/edit"}],"Kia":[{t:"MT38 cloning with PCMtuner",tool:"PCMtuner + Godiag Tri Core",b:"Cloning MT38 With PCMtuner:\n- Use PCMtuner under module 52 BSL MT38\n- Use Godiag Tri Core cable\n- Select Hyundai -> Module 52 -> BSL",u:"https://docs.google.com/document/d/1SGuFlVL35Hv2Q2VA_KtR8B6fxbKU7KFoFEa5u0IeHAU/edit"},{t:"Kia Soul 2015 cluster - EEPROM clone",tool:"AR32 / chip clip",b:"Mileage correction on cluster to used cluster.\n- AR32 to read original EEPROM\n- 24C16WP ST on back of cluster",u:"https://docs.google.com/document/d/1Bi4IiVNwdiv81T8f0HVtdApjG9xfuaSCA0bCvscnLrM/edit"}],"Hyundai":[{t:"MT38 cloning with PCMtuner",tool:"PCMtuner + Godiag Tri Core",b:"Same as Kia MT38 workflow. Module 52 BSL MT38.",u:"https://docs.google.com/document/d/1SGuFlVL35Hv2Q2VA_KtR8B6fxbKU7KFoFEa5u0IeHAU/edit"}],"Ford":[{t:"14 Ford F250 Bosch cloning",tool:"Flex / bench",b:"14 Ford F250 Bosch Cloning - see Drive document for full pinout and procedure.",u:"https://docs.google.com/document/d/1326MMAaONSlbzvUd0j3lulftEQXWcLmsCu4gnFfzZmI/edit"},{t:"Ford Black Oak PCM bench programming",tool:"Godiag box (middle connector)",b:"Bench programming using Godiag box, middle connector. Pin out is on customecm.com",u:"https://docs.google.com/document/d/1BrlqpzACIDC4u5fQ5OL5E7czqrfKl9CqqE8j7Pqdeus/edit"}]};

async function searchJobAidFolder(make, keywords, existingUrls){
  const section = document.getElementById("ja-drive-section");
  if(!section) return;

  try{
    // Search within the Job Aid folder using each keyword
    const query = keywords.slice(0,3).join(" OR ");
    const prompt = `Search Google Drive folder ID "${JOB_AID_FOLDER.id}" for files whose names contain any of these words: ${keywords.join(", ")}. Return a JSON array of objects with fields: id, name, mimeType, webViewLink. Return only the JSON array, nothing else.`;

    const data = await driveCall([{role:"user",content:prompt}]);
    if(!data){ section.innerHTML=`<div style="font-size:12px;color:#aaa;padding:8px 0">Could not reach Drive — <a href="${JOB_AID_FOLDER.url}" target="_blank" style="color:#E8000D">Open folder directly ↗</a></div>`; return; }

    // Parse results
    let files = [];
    for(const blk of (data.content||[])){
      if(blk.type==="mcp_tool_result"){
        try{
          const p = JSON.parse(blk.content?.[0]?.text||"[]");
          if(Array.isArray(p)) files.push(...p);
          else if(p.files) files.push(...p.files);
        }catch(e){}
      }
    }
    // Also check text blocks for JSON array
    if(!files.length){
      const txt = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      const m = txt.match(/\[\s*\{[\s\S]*?\}\s*\]/);
      if(m){ try{ files = JSON.parse(m[0]); }catch(e){} }
    }

    // Filter: name must contain at least one keyword (case-insensitive)
    const kw = keywords.map(k=>k.toLowerCase());
    const matched = files.filter(f=>{
      const name = (f.name||"").toLowerCase();
      return kw.some(k=>name.includes(k));
    });

    // Deduplicate against static entries
    const newFiles = matched.filter(f=>{
      const url = f.webViewLink||f.url||`https://drive.google.com/open?id=${f.id}`;
      return !existingUrls.some(u=>u.includes(f.id)||url.includes(f.id));
    });

    if(!newFiles.length){
      section.innerHTML = `<div style="font-size:12px;color:#aaa;padding:8px 0">No additional files found in Drive for ${make}. <a href="${JOB_AID_FOLDER.url}" target="_blank" style="color:#E8000D">Browse folder ↗</a></div>`;
      return;
    }

    let h = `<div class="sl" style="margin-bottom:8px">From Drive — ${make} (${newFiles.length} found)</div>`;
    h += newFiles.map(f=>{
      const url = f.webViewLink||`https://drive.google.com/open?id=${f.id}`;
      return jaCardHTML({t:f.name, u:url, tag:"Drive", b:""}, true);
    }).join("");

    section.innerHTML = h;
  }catch(e){
    section.innerHTML = `<div style="font-size:12px;color:#aaa;padding:8px 0">Drive search failed. <a href="${JOB_AID_FOLDER.url}" target="_blank" style="color:#E8000D">Open folder directly ↗</a></div>`;
  }
}

async function findDriveFile(){
  const d=await driveCall([{role:"user",content:`Search Google Drive for a file named exactly "${DRIVE_FILE_NAME}". Return file ID or NOT_FOUND.`}]);
  if(!d)return null;
  for(const r of d.content.filter(b=>b.type==="mcp_tool_result")){
    try{const p=JSON.parse(r.content?.[0]?.text||"");const f=p.files||p.items||[];if(f.length>0)return f[0].id||null;}catch(e){}
  }
  const txt=d.content.filter(b=>b.type==="text").map(b=>b.text).join("").trim();
  if(txt&&txt!=="NOT_FOUND"&&txt.length>10&&!txt.includes(" "))return txt;
  return null;
}
async function readDriveFile(fid){

function seedDefaultNotes(){
  // Clear any programming data that bled into wrong tabs
  const clearMap = [
    {make:"Mazda",model:"Mazda3",tab:"diag",keywords:["PCM Programming","TCM Programming","MDARS","Mazda Diagnostic"]},
    {make:"Mazda",model:"Mazda3",tab:"keys",keywords:["PCM Programming","TCM Programming","MDARS"]},

  ];
  for(const cm of clearMap){
    const md = gMod(cm.make,cm.model);
    if(md.nt && md.nt[cm.tab]){
      let val = md.nt[cm.tab];
      for(const kw of cm.keywords){
        if(val.includes(kw)){val="";break;}
      }
      md.nt[cm.tab] = val.trim();
    }
  }
  // Only seeds if the note doesn't already exist
  const seeds = [
    {
      make:"Mazda", model:"Mazda3", tab:"prog",
      note:"[PCM Programming — 2019 Mazda 3]\n• Software required: MDARS (Mazda Diagnostic and Repair Software)\n• Use MDARS for all PCM and module programming operations\n• MDARS is the OEM Mazda diagnostic and programming platform\n🔗 Drive: https://drive.google.com/file/d/1daiVyoUR00cE799nST5ZZ8k5iB_dMeZ78yy4tGGrlLc/view"
    },
    {
      make:"Mazda", model:"Mazda3", tab:"prog",
      note:"[TCM Programming — 2019 Mazda 3]\n• TCM programming is performed using MDARS\n• TCM is internal to the transmission and comes blank from the factory\n• A PC power supply is required to power the TCM during programming\n• In MDARS, select \"TCM Replacement\" to perform the programming procedure\n• Do not use a standard battery charger — a regulated PC power supply is required to maintain stable voltage throughout the programming process\n🔗 Drive: https://drive.google.com/file/d/1h-kzeLpPp8JPcv5lpQWyOtM6SL0pxdyFDL6Hv50oi6Y/view"
    }
  ];
  for(const s of seeds){
    const md = gMod(s.make, s.model);
    if(!md.nt) md.nt = {};
    // Only seed the correct tab, only if this note isnt already there
    const existing = md.nt[s.tab] || "";
    const firstLine = s.note.split("\n")[0].trim();
    if(!existing.includes(firstLine)){
      md.nt[s.tab] = existing ? existing + "\n\n" + s.note : s.note;
    }
    // Clear any accidental bleed into other tabs
    const otherTabs = ["prog","diag","keys","gen","clone"].filter(t=>t!==s.tab);
    for(const ot of otherTabs){
      if(md.nt[ot] && md.nt[ot].includes(firstLine)){
        md.nt[ot] = md.nt[ot].replace(new RegExp("\\n\\n"+firstLine.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"[\\s\\S]*?(\\n\\n|$)","g"),"").trim();
      }
    }
    if(!gU(s.make).__m) gU(s.make).__m = [];
    if(!gU(s.make).__m.includes(s.model)) gU(s.make).__m.push(s.model);
  }
}

// ── Google Drive search ──────────────────────────────────
// Uses OAuth2 when available (claude.ai), falls back to
// API-key-based approach when running locally.
// To enable local search: paste your Google API key below.
const GOOGLE_API_KEY = "";  // API key disabled — using OAuth

async function driveRESTSearch(query, maxResults=20){
  // ── API key path (works locally) ──────────────────────────
  if(GOOGLE_API_KEY){
    // Drive v3 API with API key
    const qStr = "fullText contains '" + query.replace(/'/g,"") + "' or name contains '" + query.replace(/'/g,"") + "'";
    const params = new URLSearchParams({
      q: qStr,
      pageSize: maxResults,
      fields: "files(id,name,mimeType,webViewLink,modifiedTime,size)",
      key: GOOGLE_API_KEY
    });
    const url  = `https://www.googleapis.com/drive/v3/files?${params}`;
    const resp = await fetch(url);
    if(!resp.ok){
      const err = await resp.json().catch(()=>({}));
      throw new Error("Drive API error "+resp.status+": "+(err?.error?.message||"unknown"));
    }
    const data = await resp.json();
    return (data.files||[]).map(f=>({
      id:f.id,
      title:f.name,
      mimeType:f.mimeType,
      viewUrl:f.webViewLink||`https://drive.google.com/open?id=${f.id}`,
      modifiedTime:f.modifiedTime,
      fileSize:f.size
    }));
  }

  // ── OAuth2 path (works inside claude.ai) ──────────────────
  if(!(_gToken && Date.now() < _gTokenExp - 30000)){
    try{
      if(typeof google !== "undefined" && google.accounts){
        _gToken = await new Promise((resolve,reject)=>{
          const client = google.accounts.oauth2.initTokenClient({
            client_id:"1090232651522-phhuqcfpfcri9g3ovif4qev41p8007fi.apps.googleusercontent.com", // Authorized for https://codygaddie-dot.github.io
            scope:"https://www.googleapis.com/auth/drive.readonly",
            prompt:"",
            callback:(resp)=>{ resp.access_token?resolve(resp.access_token):reject(new Error("oauth_failed")); }
          });
          client.requestAccessToken({prompt:""});
        });
        _gTokenExp = Date.now() + 3600000;
      }
    }catch(e){ _gToken=null; }
  }

  if(_gToken){
    const qStr = "fullText contains '" + query.replace(/'/g,"") + "' or name contains '" + query.replace(/'/g,"") + "'";
    const params = new URLSearchParams({
      q: qStr,
      pageSize: maxResults,
      fields: "files(id,name,mimeType,webViewLink,modifiedTime,size)"
    });
    const url  = `https://www.googleapis.com/drive/v3/files?${params}`;
    const resp = await fetch(url, {headers:{Authorization:"Bearer "+_gToken}});
    if(!resp.ok) throw new Error("Drive API error "+resp.status);
    const data = await resp.json();
    return (data.files||[]).map(f=>({
      id:f.id,
      title:f.name,
      mimeType:f.mimeType,
      viewUrl:f.webViewLink||`https://drive.google.com/open?id=${f.id}`,
      modifiedTime:f.modifiedTime,
      fileSize:f.size
    }));
  }

  throw new Error("NO_AUTH");
}

let speechRec=null;
function toggleRecording(){
  if(voiceState==='idle')startRecording();
  else if(voiceState==='recording')stopRecording();
}

function startRecording(){
  voiceState='recording'; recSeconds=0;
  updateVoiceBtn();
  recInterval=setInterval(()=>{
    recSeconds++;
    const t=document.getElementById("voiceTimer");
    if(t)t.textContent=fmtTime(recSeconds);
    animateWaveform();
  },1000);

  // Request mic permission — keep stream alive so browser remembers permission
  navigator.mediaDevices?.getUserMedia({audio:true}).then(stream=>{
    // Keep stream reference so permission stays granted
    window._micStream = stream;
    // Now start speech recognition
    _startSpeechRec();
  }).catch(err=>{
    // Mic permission denied or not available
    voiceState='idle';
    clearInterval(recInterval); recInterval=null;
    updateVoiceBtn();
    const msg = err.name==='NotAllowedError'
      ? "⚠️ Microphone access denied. Please allow mic access in your browser settings, then try again."
      : err.name==='NotFoundError'
      ? "⚠️ No microphone found. Please connect a mic and try again."
      : "⚠️ Mic error: "+err.message+". You can type your note manually.";
    setVoiceStatus(msg);
  });
  setVoiceStatus("🎙️ Recording… speak now");
}

function _startSpeechRec(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){setVoiceStatus("🎙️ Recording… (type transcript manually — speech recognition not supported in this browser)");return;}
  try{
    speechRec=new SpeechRecognition();
    speechRec.continuous=true;
    speechRec.interimResults=true;
    speechRec.lang='en-US';
    let finalT="";
    speechRec.onresult=e=>{
      let interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)finalT+=e.results[i][0].transcript+" ";
        else interim+=e.results[i][0].transcript;
      }
      const el=document.getElementById("voiceTranscript");
      if(el)el.textContent=(finalT+interim).trim();
      ud.__cur_transcript__=(finalT+interim).trim();
    };
    speechRec.onerror=e=>{
      if(e.error==='not-allowed'){
        setVoiceStatus("⚠️ Mic access denied. Allow microphone access in browser settings.");
      } else if(e.error==='no-speech'){
        setVoiceStatus("🎙️ No speech detected — keep talking or stop recording.");
      } else if(e.error==='network'){
        setVoiceStatus("⚠️ Network error with speech service. Type your note manually.");
      } else {
        setVoiceStatus("⚠️ Speech error: "+e.error+". You can type your note manually.");
      }
    };
    speechRec.onend=()=>{
      // Auto-restart if still in recording state
      if(voiceState==='recording'){try{speechRec.start();}catch(e){}}
    };
    speechRec.start();
  }catch(e){
    setVoiceStatus("⚠️ Could not start speech recognition. Type your note manually.");
    speechRec=null;
  }
}
function stopRecording(){
  if(speechRec){try{speechRec.stop();}catch(e){}speechRec=null;}
  // Release mic stream after stopping
  if(window._micStream){window._micStream.getTracks().forEach(t=>t.stop());window._micStream=null;}
  clearInterval(recInterval);recInterval=null;
  voiceState='idle';
  updateVoiceBtn();
  const t=document.getElementById("voiceTimer");
  if(t)t.textContent="";
  setVoiceStatus("Done. Review and edit transcript, then save.");
  const wave=document.getElementById("voiceWave");
  if(wave)wave.innerHTML="";
}

async function driveGetOrCreateFolder(name, parentId){
  // Uses Claude API + Drive MCP to find or create a folder
  const sys = "You are a Google Drive file manager. Use Drive MCP tools. Return ONLY the folder ID as plain text, nothing else.";
  const prompt = `In Google Drive, find or create a folder named exactly "${name}" inside parent folder ID "${parentId}". If it already exists return its ID. If not, create it and return the new ID. Return ONLY the folder ID string.`;
  try{
    const data = await driveCall([{role:"user",content:prompt}], sys);
    if(!data)return parentId;
    // Extract folder ID from response
    for(const blk of(data.content||[])){
      if(blk.type==="mcp_tool_result"){
        try{
          const p=JSON.parse(blk.content?.[0]?.text||"");
          if(p.id)return p.id;
        }catch(e){}
      }
    }
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    // If response looks like a folder ID (long alphanumeric string)
    if(txt && txt.length > 10 && !txt.includes(" "))return txt;
    return parentId;
  }catch(e){return parentId;}
}

async function driveCreateDoc(title, body, parentId){
  // Base64 encode the content
  const content = btoa(unescape(encodeURIComponent(body)));
  const sys = "You are a Google Drive file manager. Use Drive MCP tools. Return ONLY a JSON object with id and webViewLink fields.";
  const prompt = parentId
    ? `Create a new Google Doc titled "${title}" in folder ID "${parentId}". Content (plain text, base64 encoded): ${content}. Return JSON with id and webViewLink.`
    : `Create a new Google Doc titled "${title}". Content (plain text, base64 encoded): ${content}. Return JSON with id and webViewLink.`;
  try{
    const data = await driveCall([{role:"user",content:prompt}], sys);
    if(!data)return null;
    for(const blk of(data.content||[])){
      if(blk.type==="mcp_tool_result"){
        try{
          const p=JSON.parse(blk.content?.[0]?.text||"");
          if(p.id)return {id:p.id, url:p.webViewLink||p.alternateLink||`https://drive.google.com/open?id=${p.id}`};
        }catch(e){}
      }
    }
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const m=txt.match(/\{[\s\S]*?\}/);
    if(m){try{const p=JSON.parse(m[0]);if(p.id)return {id:p.id,url:p.webViewLink||`https://drive.google.com/open?id=${p.id}`};}catch(e){}}
    return null;
  }catch(e){return null;}
}

function rMB(mod){

function fmtNote(text){
  // Render plain text note with clickable Drive links and line breaks
  return text.split("\n").map(line=>{
    // Convert 🔗 Drive: URL lines to hyperlinks
    const linkMatch = line.match(/^(🔗\s*Drive:\s*)(https?:\/\/\S+)$/);
    if(linkMatch){
      return `<div style="margin-top:4px"><a href="${linkMatch[2]}" target="_blank"
        style="color:#E8000D;font-weight:600;font-size:12px;text-decoration:none">
        🔗 Open in Drive ↗</a></div>`;
    }
    // Section headers like [PCM Programming — 2019 Mazda 3]
    if(line.match(/^\[.+\]$/)){
      return `<div style="font-weight:700;font-size:13px;color:#1a1a19;margin-top:4px;margin-bottom:4px">${escH(line)}</div>`;
    }
    // Bullet points
    if(line.startsWith("•")){
      return `<div style="padding-left:12px;font-size:13px;color:#333;line-height:1.6">${escH(line)}</div>`;
    }
    return line.trim() ? `<div style="font-size:13px;color:#333">${escH(line)}</div>` : "";
  }).join("");
}

function rNt(mod){
  const nd=gMod(sm,mod).nt;
  // When a specific top tab is active, only show that section
  const sections=(at==="prog"||at==="diag")?[[at,at==="prog"?"Programming":"Diagnostics"]]:[["prog","Programming"],["diag","Diagnostics"]];
  return sections.map(([id,l])=>{
    const raw=nd[id]||"";
    // Split on double newline between [Section] entries
    const parts=raw.split(/\n\n(?=\[)/).filter(p=>p.trim());
    const s=sid(mod+"_"+id);
    if(parts.length>1){
      // Multiple entries — show each as its own styled card
      return `<div style="margin-bottom:14px">
        <div class="sl">${l}</div>`+
        parts.map((p,i)=>{
          const si=sid(mod+"_"+id+"_"+i);
          const isEditing=false;
          return `<div style="margin-bottom:8px;border:1px solid #e0dfd8;border-radius:8px;overflow:hidden;background:#fafaf8">
            <div id="view_${si}" style="padding:10px 12px;cursor:pointer" onclick="toggleNoteEdit('${si}')">
              ${fmtNote(p.trim())}
            </div>
            <div id="edit_${si}" style="display:none">
              <textarea id="ta_${si}" style="border:none;border-radius:0;margin:0;min-height:120px">${escH(p.trim())}</textarea>
              <div style="padding:4px 8px;background:#f5f5f3;border-top:1px solid #e0dfd8;display:flex;gap:6px;justify-content:flex-end">
                <button class="btn" onclick="toggleNoteEdit('${si}')">Cancel</button>
                <button class="btn am" onclick="svNPart('${esc(mod)}','${id}',${i},'ta_${si}','view_${si}')">Save</button>
              </div>
            </div>
          </div>`;
        }).join("")+
        `<button class="btn am" style="margin-top:4px" onclick="addNPart('${esc(mod)}','${id}')">+ Add Entry</button>
      </div>`;
    }
    // Single entry — show styled card
    return`<div style="margin-bottom:14px">
      <div class="sl">${l}</div>
      <div style="border:1px solid #e0dfd8;border-radius:8px;overflow:hidden;background:#fafaf8">
        <div id="view_${s}" style="padding:10px 12px;cursor:pointer;min-height:40px" onclick="toggleNoteEdit('${s}')">
          ${raw.trim()?fmtNote(raw):'<span style="color:#aaa;font-size:12px">Tap to add notes…</span>'}
        </div>
        <div id="edit_${s}" style="display:none">
          <textarea id="ta_${s}" style="border:none;border-radius:0;margin:0;min-height:100px">${raw}</textarea>
          <div style="padding:4px 8px;background:#f5f5f3;border-top:1px solid #e0dfd8;display:flex;gap:6px;justify-content:flex-end">
            <button class="btn" onclick="toggleNoteEdit('${s}')">Cancel</button>
            <button class="btn am" onclick="svN('${esc(mod)}','${id}','ta_${s}','view_${s}')">Save</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggleNoteEdit(sid){
  const v=document.getElementById("view_"+sid);
  const e=document.getElementById("edit_"+sid);
  if(!v||!e)return;
  const editing=e.style.display!=="none";
  v.style.display=editing?"block":"none";
  e.style.display=editing?"none":"block";
}

function svNPart(mod,tab,idx,taId,viewId){
  const val=document.getElementById(taId)?.value||"";
  const md=gMod(sm,mod);
  if(!md.nt)md.nt={};
  const parts=(md.nt[tab]||"").split(/\n\n(?=\[)/).filter(p=>p.trim());
  parts[idx]=val.trim();
  md.nt[tab]=parts.join("\n\n");
  saveData();
  // Refresh the view div with formatted content
  const vEl=document.getElementById(viewId);
  if(vEl)vEl.innerHTML=fmtNote(val.trim());
  // Hide edit, show view
  const eEl=document.getElementById(taId)?.closest("[id^='edit_']");
  if(eEl)eEl.style.display="none";
  if(vEl)vEl.style.display="block";
  showToast("Saved!");
}

function addNPart(mod,tab){
  const md=gMod(sm,mod);
  if(!md.nt)md.nt={};
  const existing=md.nt[tab]||"";
  md.nt[tab]=(existing?existing+"\n\n":"")+"[New Entry]\n• ";

  const mc=document.querySelector(`.mc .mcn`);

}
function rKP(mod){
  const md=gMod(sm,mod);const kp=md.kp||{};const s=sid(mod+"_kp");

function rFl(mod){
  const md=gMod(sm,mod);const fs=md.fs||[];const ms=sid(mod);
  return`<div style="margin-bottom:8px">${fs.length===0?'<div style="font-size:13px;color:#aaa">No files attached</div>':""}${fs.map((f,i)=>{const ext=(f.name.split(".").pop()||"").toLowerCase();const ico=["jpg","jpeg","png","gif","webp"].includes(ext)?"[IMG]":ext==="pdf"?"[PDF]":["doc","docx"].includes(ext)?"[DOC]":"[FILE]";return`<div class="fc"><span style="font-size:11px;font-weight:600;color:#888;width:34px">${ico}</span><div style="flex:1;min-width:0"><div class="fn">${f.name}</div><div class="fz">${f.size||""}</div></div><div style="display:flex;gap:4px">${f.data?`<span class="fb" onclick="dlF(${i},'${esc(mod)}')">Download</span>`:""}<span class="fb dx" onclick="dFl('${esc(mod)}',${i})">Remove</span></div></div>`;}).join("")}</div>

}

function esc(s){return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'")}
function sid(s){return s.replace(/[^a-zA-Z0-9]/g,"_")}
function tog(m){em[m]=!em[m];render();}
function sIT(m,t){mit[m]=t;rr(m);}

function svN(mod,nt,taId,viewId){
  const v=document.getElementById(taId)?.value||"";
  const md=gMod(sm,mod);
  md.nt[nt]=v;
  gU(sm)[mod]=md;
  saveData();
  const vEl=document.getElementById(viewId);
  if(vEl)vEl.innerHTML=v.trim()?fmtNote(v):'<span style="color:#aaa;font-size:12px">Tap to add notes…</span>';
  const eEl=document.getElementById("edit_"+taId.replace("ta_",""));
  if(eEl)eEl.style.display="none";

}
function svKP(mod,s){const md=gMod(sm,mod);if(!md.kp)md.kp={};md.kp.notes=document.getElementById(s).value;gU(sm)[mod]=md;saveData();fl("b_"+s,"Save");}
function aCode(mod){const ms=sid(mod);const l=document.getElementById("cL_"+ms).value.trim();const v=document.getElementById("cV_"+ms).value.trim();if(!l||!v)return;const md=gMod(sm,mod);if(!md.kp)md.kp={};if(!md.kp.codes)md.kp.codes=[];md.kp.codes.push({label:l,value:v});gU(sm)[mod]=md;saveData();document.getElementById("cL_"+ms).value="";document.getElementById("cV_"+ms).value="";rr(mod);}
function dCode(mod,i){const md=gMod(sm,mod);md.kp.codes.splice(i,1);saveData();rr(mod);}
function tUp(mod){document.getElementById("fi_"+sid(mod)).click();}
function hDrop(e,mod){e.preventDefault();hF(e.dataTransfer.files,mod);}
function hF(files,mod){Array.from(files).forEach(file=>{const ext=(file.name.split(".").pop()||"").toLowerCase();const isImg=["jpg","jpeg","png","gif","webp"].includes(ext);if(file.size>(isImg?3:5)*1024*1024){alert(file.name+" too large");return;}const reader=new FileReader();reader.onload=e=>{const sz=file.size>1048576?(file.size/1048576).toFixed(1)+" MB":(file.size/1024).toFixed(0)+" KB";const md=gMod(sm,mod);md.fs.push({name:file.name,size:sz,type:file.type,data:e.target.result});gU(sm)[mod]=md;saveData();rr(mod);};reader.readAsDataURL(file);});}
function dFl(mod,i){const md=gMod(sm,mod);md.fs.splice(i,1);saveData();rr(mod);}
function dlF(i,mod){const md=gMod(sm,mod);const f=md.fs[i];if(!f||!f.data)return;const a=document.createElement("a");a.href=f.data;a.download=f.name;a.click();}
function cpT(v){navigator.clipboard.writeText(v).then(()=>showToast("Copied!")).catch(()=>{});}
function fl(id,lbl){const b=document.getElementById(id);if(!b)return;b.textContent="Saved!";b.classList.add("sv");setTimeout(()=>{b.textContent=lbl||"Save";b.classList.remove("sv");},2000);}
function addMod(){const inp=document.getElementById("nmi");const n=inp.value.trim();if(!n)return;const d=gU(sm);if(!d.__m)d.__m=[];if(!d.__m.includes(n))d.__m.push(n);saveData();inp.value="";em[n]=true;render();}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}

        {t:"<strong>Opcode errors (E4491, E4423) recovery.</strong> If SPS2 throws an opcode error mid-session leaving a module in a partial state: connect GDS2, navigate to the module, read its current status. GDS2 special functions → Module Reset can restore the module to a communicating state so SPS2 can retry the programming operation."}
      ],
      notes:[
        {type:"note",text:"GDS2 and SPS2 share the same MDI driver layer. If MDI shows green in MDI Manager, both tools will work. Never run GDS2 and SPS2 simultaneously on the same MDI connection — one at a time only."},
        {type:"tip",text:"GDS2 quarterly updates: GM pushes updates regularly. If GDS2 prompts for an update, apply it before starting a job — not mid-session. Mismatched GDS2 versions can fail to recognize newer module calibration data."},
        {type:"tip",text:"For 2019+ GM trucks with the 10-speed transmission (10L90/10L80): FastLearn in GDS2 is strongly recommended after any TCM programming. Skipping it leads to harsh shifts and adaptation errors. Trans must be at full operating temp with correct fluid level."}
      ],

    {
      id:"gm-sps2-troubleshoot",
      title:"SPS2 Troubleshooting — Common Errors & Fixes",
      badge:"ib-troubleshoot",badgeLabel:"Troubleshoot",
      prereqs:["SPS2 already installed and configured","MDI2 connected and showing green in MDI Manager"],
      steps:[
        {t:"<strong>MDI not appearing in SPS2 interface list.</strong> Close Chrome. Open MDI Manager and confirm MDI shows green. If MDI Manager is not running, launch it from the Start menu or system tray. Reopen SPS2 in Chrome. If MDI still missing: unplug MDI USB, wait 15 seconds, replug, wait for MDI Manager to show green again."},
        {t:"<strong>SPS2 won't load / blank screen in Chrome.</strong> Clear Chrome cache and cookies for acdelcotds.com (Settings → Privacy → Clear browsing data → select Cookies and Cached images). Log out of acdelcotds.com, log back in, relaunch SPS2. Confirm Chrome popups are allowed for acdelcotds.com."},
        {t:"<strong>Calibration file not found / wrong strategy.</strong> Verify VIN is entered correctly — one wrong character will pull the wrong vehicle config. Cross-check the calibration number on the physical module label against what SPS2 is trying to load. If mismatch: manually search calibration by part number in SPS2."},
        {t:"<strong>Session timeout mid-programming.</strong> If the browser session times out during a long flash: do NOT close the window. Wait — SPS2 will attempt to resume. If the module stops responding: use GDS2 to check module status before retrying. Never key cycle immediately after a timeout."},
        {t:"<strong>Error E5659 / M5304 / M5530.</strong> These are server-side security flag errors — GM Techline has flagged something on the account or VIN. Do NOT retry. Call GM TCSC (1-800-825-5886 for US). Have the VIN, module part number, and the exact error code ready. They will authorize and walk through the correct procedure."},
        {t:"<strong>Error E4491 / E4423 (Opcode errors).</strong> Communication failure during flash. Causes in order of frequency: (1) shared Wi-Fi — switch to wired ethernet, (2) Windows Update running in background — pause updates, (3) MDI2 USB cable — swap for a known-good cable, (4) vehicle battery low — connect charger maintaining 13.5–14.5V during programming."},
        {t:"<strong>Module stuck in programming mode / won't communicate.</strong> Connect GDS2, navigate to the affected module. Try Special Functions → Module Reset. If no response in GDS2: attempt a 10-minute keep-alive with MDI connected and ignition on, then retry GDS2. For PCM: some may require bench power to recover — consult the module-specific procedure in the GM service info."}
      ],
      notes:[
        {type:"warning",text:"Always maintain battery voltage between 13.5V and 14.5V during any SPS2 programming session. Use a dedicated battery maintainer/charger — not just the vehicle's alternator. Low voltage is the #1 cause of mid-flash failures on GM modules."},
        {type:"tip",text:"Build a dedicated SPS2 laptop: Windows 10, Chrome only, no antivirus beyond Windows Defender, Windows Updates paused, wired ethernet adapter, MDI2 USB always connected. Label it 'GM SPS2 ONLY' and don't use it for anything else."}
      ],
      links:[
        {label:"ACDelco TDS",url:"https://www.acdelcotds.com"},
        {label:"GM TCSC (Techline)",url:"tel:18008255886"},
        {label:"J2534 Wrapper Install Guide (Drive)",url:"https://drive.google.com/file/d/1dnNEWfl4rJ_b2MxZgmvPwRoOYJE9ffGa/view"}
      ]
    }

  "Jaguar / Land Rover": [
    {
      id:"jlr-topix",
      title:"TOPIx Cloud — JLR Diagnostic & Programming Platform",
      badge:"ib-install",badgeLabel:"Install",
      prereqs:["Windows 10 64-bit","Google Chrome (required — TOPIx is fully browser-based)","JLR-approved VCI (Mongoose Pro JLR or iLand)","Active TOPIx subscription (topix.jaguar.com / topix.landrover.com)","Stable internet connection — cloud-based, no offline mode"],
      steps:[
        {t:"<strong>Purchase TOPIx subscription.</strong> Go to <code>topix.jaguar.com</code> (Jaguar) or <code>topix.landrover.com</code> (Land Rover). Independent shop subscriptions are available by the day, month, or year. Annual is most cost-effective for regular JLR work. Save credentials in the Subscriptions tab."},
        {t:"<strong>TOPIx is fully browser-based — no software install required.</strong> Open Google Chrome and log into the TOPIx portal. The application launches in the browser. Do NOT use Internet Explorer or Edge — Chrome only. Allow popups from the TOPIx domain."},
        {t:"<strong>Install VCI drivers.</strong> TOPIx requires a JLR-approved J2534 PassThru VCI. The Mongoose Pro JLR and Bosch iLand are the most common options for independent shops. Download and install the VCI drivers from the manufacturer's website before connecting hardware. Restart the laptop after driver install."},
        {t:"<strong>Connect VCI and verify PassThru.</strong> Connect the VCI to the vehicle DLC and to the laptop USB. In TOPIx, the interface should auto-detect. If it does not appear: confirm the J2534 driver is registered (check via Windows Registry or the VCI manufacturer's diagnostic tool). Wired USB connection only — do not use wireless VCI for programming sessions."},
        {t:"<strong>Vehicle identification.</strong> TOPIx identifies vehicles by VIN. Enter the 17-digit VIN manually or allow TOPIx to read it from the gateway module. TOPIx will load the vehicle's build specification from the JLR server — this determines which modules are fitted and which calibrations are applicable."},
        {t:"<strong>Module programming in TOPIx.</strong> Navigate to <strong>Diagnosis → Modules</strong>, select the target module, and choose <strong>Module Programming</strong>. TOPIx will check the current module version against the latest available calibration and offer an update if one exists. Always accept the latest calibration unless there is a specific reason not to."},
        {t:"<strong>Configuration and coding after programming.</strong> After any module replacement or reflash, TOPIx requires a <strong>Configure Existing Modules</strong> routine. This writes the vehicle's build configuration back to the replacement module — critical for BCM, GWM (Gateway), PEPS (keyless entry), and TCCM. Skipping this step causes multiple DTCs and feature loss."},
        {t:"<strong>SDD vs TOPIx — which to use.</strong> TOPIx is the current platform for 2015+ JLR vehicles. SDD (see below) covers pre-2015 vehicles. Some overlap exists in the 2012–2016 range — if TOPIx shows limited module coverage for a vehicle, try SDD. For key programming on 2018+ vehicles, TOPIx handles everything OBD — older vehicles may require SDD or a third-party tool for all-keys-lost scenarios."}
      ],
      notes:[
        {type:"warning",text:"TOPIx requires active internet for every session. If connection drops mid-programming, the module may be left in an intermediate state. Always ensure a stable wired or reliable Wi-Fi connection before starting any programming operation."},
        {type:"warning",text:"Configure Existing Modules MUST be run after any module replacement (BCM, GWM, PEPS, TCCM, TCM, ABS). Failing to run this step will cause the replacement module to default to a generic configuration that does not match the vehicle's build — resulting in fault codes, disabled features, and possible no-start."},
        {type:"note",text:"TOPIx subscription tiers: Read-only (free), Standard (diagnostics + basic config), and Full Programming (module flash + configure). You need Full Programming tier for module replacement work. Confirm your subscription level before quoting JLR programming jobs."},
        {type:"note",text:"Mongoose Pro JLR is the preferred VCI for independent shops. Bosch iLand also works well. Avoid generic J2534 adapters — JLR's PassThru implementation has strict timing requirements that cheap adapters fail to meet, causing mid-session communication errors."},
        {type:"tip",text:"JLR vehicles use a Gateway Module (GWM) that blocks OBD access on 2019+ models without an authenticated tool. TOPIx handles this automatically when logged in. Third-party scan tools (Autel, Launch) may need a separate GWM unlock procedure before they can access all modules on newer JLR vehicles."}
      ],
      links:[
        {label:"TOPIx Jaguar",url:"https://topix.jaguar.com"},
        {label:"TOPIx Land Rover",url:"https://topix.landrover.com"},
        {label:"JLR Vehicle Notes (Drive)",url:"https://drive.google.com/drive/folders/1-gtN2Ur1Qc0LQR9c50bgGgXN6LmLLj6S"}
      ]

      id:"jlr-sdd",

      steps:[
        {t:"<strong>SDD covers pre-2015 JLR vehicles</strong> (older Range Rover, Discovery 4, XF, XJ, Freelander 2, Defender). For 2015+ vehicles use TOPIx. SDD is a desktop application, not browser-based."},
        {t:"<strong>Install SDD on a 32-bit Windows environment.</strong> SDD is a 32-bit application — it requires Windows 7 32-bit or Windows 10 running in 32-bit compatibility. A dedicated older laptop running Windows 7 32-bit is the most reliable setup. SDD has known issues on Windows 10 64-bit."},
        {t:"<strong>Install VCI drivers before connecting hardware.</strong> Use the same JLR-approved VCI as TOPIx (Mongoose Pro JLR works with both). Install drivers, restart, then connect VCI. SDD should detect the interface on launch under the Communications menu."},
        {t:"<strong>SDD activation.</strong> SDD requires a software license file tied to the laptop's hardware ID. Purchase the license from the JLR portal or an authorized reseller. Copy the license file to the SDD license folder as directed in the SDD install guide. SDD will not connect to vehicles without a valid license."},
        {t:"<strong>Using SDD for programming.</strong> Connect SDD to vehicle, let it perform a full vehicle scan to identify all fitted modules. Navigate to the module requiring programming, select <strong>Reconfigure / Programme</strong>. SDD will check the current calibration and load the replacement file from the local database — unlike TOPIx, SDD works from a local calibration database that must be kept updated."},
        {t:"<strong>Keeping SDD calibration database current.</strong> SDD releases periodic updates to the calibration database. Download and install updates from the JLR partner portal. Running outdated calibration files will result in SDD attempting to program an older strategy — always verify the calibration version matches the latest available before programming."},
        {t:"<strong>Key programming with SDD.</strong> SDD handles Jaguar and Land Rover key programming for pre-2015 models. Navigate to Body → Security → Key Programming. All working keys must be present. For all-keys-lost on older models, SDD can perform the full procedure if the PATS/PEPS module is still communicating."}

        {type:"note",text:"SDD and TOPIx overlap on 2012–2016 vehicles. If one tool fails to fully cover a vehicle's module set, try the other. Some 2013–2014 Range Rover Sport and Discovery Sport models are better handled by TOPIx even though they fall within SDD's nominal range."},
        {type:"tip",text:"For JLR key programming on 2018+ vehicles (Velar, Defender 2020+, I-Pace, E-Pace), TOPIx handles the full procedure. For 2012–2017 with all-keys-lost, a combination of Autel IM608 and SDD/TOPIx may be required depending on the specific security system generation."}

      steps:[
        {t:"<strong>Understand ISTA versions.</strong> BMW uses two ISTA builds: <strong>ISTA+</strong> is the current dealer platform (cloud-connected, subscription-based). <strong>ISTA-D / ISTA-P</strong> is the standalone/independent version — same core software, runs locally from a database without dealer credentials. Most independent shops run the standalone ISTA-D build. Both use the same ICOM hardware."},
        {t:"<strong>Install the ISTA server and client.</strong> ISTA runs as a local server/client pair on the same machine. The installer sets up a local database server (PostgreSQL), the ISTA application server, and the client UI. Run the installer as Administrator. The install takes 20–40 minutes due to database initialization. Do not interrupt it."},
        {t:"<strong>Install ICOM drivers.</strong> The BMW ICOM hardware uses a dedicated driver package. Connect ICOM A2/A3/Next via USB after driver install completes. Confirm it appears in Device Manager as a recognized BMW ICOM device. Do not connect the ICOM before the driver install finishes."},
        {t:"<strong>Configure ISTA for your ICOM interface.</strong> Launch ISTA. Go to <strong>Administration → Settings → VCI Config</strong>. Select your ICOM model from the dropdown. ISTA detects the ICOM IP address automatically via USB/Ethernet. For wireless ICOM Next: connect to the ICOM's own Wi-Fi network first, then configure the IP in ISTA settings."},
        {t:"<strong>Vehicle identification.</strong> Connect ICOM to the vehicle OBD port. In ISTA click <strong>Vehicle Order → Read Out Vehicle Data</strong>. ISTA reads the VIN and FA (vehicle order / build spec) from the vehicle. The FA data drives every subsequent operation — which modules are fitted, which coding options are valid, which programming files apply."},
        {t:"<strong>Programming (flashing) a module.</strong> After vehicle ID go to <strong>Vehicle Management → Coding/Programming → Complete Vehicle Programming</strong>. ISTA analyzes all modules against the latest software levels in the database and flags any needing updates. Select modules and execute. ISTA handles the full sequence — programs, then automatically runs coding and adaptations for each module in the correct order."},
        {t:"<strong>Coding a module.</strong> For individual coding without a full flash: <strong>Vehicle Management → Coding/Programming → Individual Programming</strong>. Select the module. ISTA shows only coding options valid for the vehicle's FA build spec — options not part of the build won't appear, preventing invalid configurations."},
        {t:"<strong>Adaptations and resets after programming.</strong> After any module replacement run <strong>Service Functions → Adaptations</strong> for the replaced module. Critical adaptations: EGS (transmission) adaptation reset after TCM work, EPS steering angle sensor initialization after steering work, battery registration after IBS sensor swap (<strong>Service Functions → Power Management → Battery Registration</strong>)."},
        {t:"<strong>Keeping ISTA database current.</strong> The programming database must be updated to contain the latest calibration files. For standalone ISTA: download the latest database package and run the database update installer. Outdated databases will attempt to program older strategies. Always verify your ISTA version and database date before any programming job."}
      ],
      notes:[
        {type:"warning",text:"Never interrupt an ISTA programming session. BMW ECUs — especially FEM, BDC, and DME — can become unrecoverable if power is lost mid-flash. If a session hangs, wait at least 10 minutes before taking any action."},
        {type:"warning",text:"Battery voltage must stay above 13.5V for the entire programming session. Use a dedicated battery support unit (CTEK, NOCO, or equivalent) in maintenance/charging mode — not a simple trickle charger."},
        {type:"warning",text:"ISTA requires the vehicle FA (build order) to be correct before programming. If the FA doesn't match actual vehicle configuration, ISTA may load incorrect coding. Verify FA against the vehicle's COC or BMW ETK parts system — especially on vehicles that have had options retrofitted or modules swapped from a different VIN."},
        {type:"note",text:"FEM (Front Electronic Module) on F-series (2012–2018) and BDC (Body Domain Controller) on G-series (2019+) are the central coding modules. All option coding, key programming, and comfort feature changes go through FEM/BDC. A replacement FEM/BDC must be coded with the correct FA before the vehicle operates normally."},
        {type:"note",text:"Key programming: ISTA handles key programming E-series through current G-series using CAS/FEM/BDC depending on year. For all-keys-lost on F/G-series, dealer-level seed/key calculation or a third-party programmer (Autel IM608 Pro II, AVDI) is required — ISTA alone cannot generate keys from scratch without dealer credentials."},
        {type:"note",text:"ICOM A2 vs A3 vs Next: all work with ISTA. ICOM Next adds Wi-Fi and faster processor. For programming, always use wired connection (USB or Ethernet directly to ICOM). Wireless ICOM is for diagnostics only."},
        {type:"tip",text:"ISTA runs best on a dedicated laptop with 16GB RAM and an SSD. The PostgreSQL database server is I/O intensive — a mechanical HDD causes ISTA to hang during vehicle ID and programming file loading."},
        {type:"tip",text:"Run ISTA as Administrator and disable Windows Defender real-time scanning for the ISTA installation folder. Antivirus scanning the PostgreSQL database files mid-session causes severe slowdowns and session failures."}

        {type:"warning",text:"VW Group uses a Security Access system — certain coding channels and adaptations require a login code (workshop code or access code) before changes are accepted. If ODIS prompts for a security access code and you don't have it, do not guess. Three wrong attempts can lock the module."},
