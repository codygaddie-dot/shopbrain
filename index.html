function rOEMInstall(b){
  // 1. Direct lookup via brand map
  const mappedKey=INSTALL_BRAND_MAP[sm];
  let matched=mappedKey?OEM_INSTALL_DATA[mappedKey]:OEM_INSTALL_DATA[sm];
  // 2. Fallback: partial string match on OEM_INSTALL_DATA keys
  if(!matched){
    for(const k of Object.keys(OEM_INSTALL_DATA)){
      if(k.toLowerCase().includes(sm.toLowerCase())||sm.toLowerCase().includes(k.split("/")[0].trim().toLowerCase())){
        matched=OEM_INSTALL_DATA[k];break;
      }
    }
  }

  // User-saved install notes for this make
  const userKey="__install_"+sm;
  const userNotes=ud[userKey]||"";

  let h=`<div class="install-hero">
    <div class="install-hero-title">🔧 OEM Software Install & Setup — ${sm}</div>
    <div class="install-hero-sub">Step-by-step install procedures, configuration requirements, and known issues for ${sm} factory tooling</div>
  </div>`;

  if(matched&&matched.length){
    h+=matched.map(tool=>{
      const isOpen=installOpen[tool.id];
      const badgeMap={
        "ib-install":"Install","ib-config":"Config","ib-setup":"Setup",
        "ib-license":"License","ib-troubleshoot":"Troubleshoot","ib-update":"Update"
      };
      return`<div class="install-card${isOpen?" open":""}" id="ic_${tool.id}">
        <div class="install-card-hdr" onclick="toggleInstall('${tool.id}')">
          <div class="install-card-title">
            <span>${tool.title}</span>
          </div>
          <div class="install-card-meta">
            <span class="install-badge ${tool.badge}">${tool.badgeLabel||badgeMap[tool.badge]||"Info"}</span>
            <span class="install-expand-arrow">▶</span>
          </div>
        </div>
        ${isOpen?`<div class="install-card-body">
          ${tool.prereqs&&tool.prereqs.length?`<div class="sl">Prerequisites</div><div class="install-prereq">${tool.prereqs.map(p=>`<span class="install-prereq-chip">${p}</span>`).join("")}</div>`:""}
          <div class="sl">Procedure</div>
          <ol class="install-step-list">
            ${tool.steps.map((s,i)=>`<li class="install-step"><span class="install-step-num">${i+1}</span><div class="install-step-text">${s.t}</div></li>`).join("")}
          </ol>
          ${(tool.notes||[]).map(n=>`<div class="install-${n.type||'note'}">${n.text}</div>`).join("")}
          ${tool.links&&tool.links.length?`<div class="install-link-row">${tool.links.map(l=>`<a class="install-link" href="${l.url}" target="_blank">↗ ${l.label}</a>`).join("")}</div>`:""}
          <div class="install-user-section">
            <div class="sl">Your notes for ${tool.title}</div>
            <textarea id="in_${tool.id}" placeholder="Add your own install notes, license keys, machine-specific quirks…">${(ud['__in_'+tool.id])||""}</textarea>
            <button class="btn sv" onclick="saveInstallNote('${tool.id}')">Save notes</button>
          </div>
        </div>`:""}
      </div>`;
    }).join("");
  } else {
    h+=`<div style="border:1px solid #e0dfd8;border-radius:10px;padding:16px;background:#f9f9f7;margin-bottom:12px">
      <div style="font-size:13px;color:#666;line-height:1.6">No built-in install procedures for <strong>${sm}</strong> yet. Use the notes area below to document your own setup procedures, or check the Drive Library for any relevant guides.</div>
    </div>`;
  }

  // General user notes for this make's install procedures
  h+=`<div style="margin-top:14px"><div class="sl">Your general install notes for ${sm}</div>
    <textarea id="in_general_${sm.replace(/[^a-z0-9]/gi,'_')}" placeholder="General OEM tooling notes for ${sm}…">${userNotes}</textarea>
    <button class="btn sv" onclick="saveInstallGeneral()">Save</button>
  </div>`;

  b.innerHTML=h;
}

function toggleInstall(id){
  installOpen[id]=!installOpen[id];
  const b=document.getElementById("BD");
  rOEMInstall(b);
}
function saveInstallNote(toolId){
  const el=document.getElementById("in_"+toolId);
  if(!el)return;
  ud["__in_"+toolId]=el.value;
  saveData();
  showToast("Notes saved!");
}
function saveInstallGeneral(){
  const key="__install_"+sm;
  const el=document.getElementById("in_general_"+sm.replace(/[^a-z0-9]/gi,'_'));
  if(!el)return;
  ud[key]=el.value;
  saveData();
  showToast("Notes saved!");
}

function renderDriveQuickButtons(){

function onDriveSearchInput(v){
  clearTimeout(driveSearchTimer);
  const res=document.getElementById("ds-results");
  if(!v.trim()){
    res.innerHTML=`<div style="text-align:center;padding:40px 20px"><div style="font-size:32px;margin-bottom:10px">📁</div><div style="font-size:13px;color:#aaa">Type to search your Drive</div><div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center" id="ds-recents"></div></div>`;
    renderDriveQuickButtons();
    return;
  }
  if(v.trim().length<2)return;
  if(driveSearchCache[v.trim()]){renderDriveResults(driveSearchCache[v.trim()],v.trim());return;}
  res.innerHTML=`<div style="text-align:center;padding:30px 20px"><div style="font-size:22px;margin-bottom:8px">⏳</div><div style="font-size:13px;color:#888">Searching Drive for "<strong>${escH(v.trim())}</strong>"…</div></div>`;
  driveSearchTimer=setTimeout(()=>runDriveSearch(v.trim()),400);
}

async function runDriveSearch(query){
  const inp=document.getElementById("ds-input");
  if(inp)inp.value=query;
  const res=document.getElementById("ds-results");
  if(!res)return;
  if(driveSearchCache[query]){renderDriveResults(driveSearchCache[query],query);return;}
  res.innerHTML=`<div style="text-align:center;padding:30px 20px"><div style="font-size:22px;margin-bottom:8px">⏳</div><div style="font-size:13px;color:#888">Searching Drive for "<strong>${escH(query)}</strong>"…</div></div>`;
  try{
    const files=await driveRESTSearch(query,20);
    driveSearchCache[query]=files;
    renderDriveResults(files,query);
  }catch(e){
    const msg=e.message||"";
    if(msg==="NO_AUTH"||msg.includes("NO_AUTH")){
      res.innerHTML=`<div style="text-align:center;padding:30px;color:#888;font-size:13px">🔐 Sign-in required — open ShopBrain via <a href="https://claude.ai" target="_blank" style="color:#E8000D">claude.ai</a> for Drive access.</div>`;
    }else if(msg.includes("popup")||msg.includes("closed")){
      res.innerHTML=`<div style="text-align:center;padding:30px;color:#888">Sign-in cancelled. Try again.</div>`;
    }else{
      res.innerHTML=`<div style="text-align:center;padding:30px;color:#A32D2D">⚠️ Drive search failed — ${escH(msg||"check connection")}</div>`;
    }
  }
}
function renderDriveResults(files,query){
  const res=document.getElementById("ds-results");
  if(!res)return;
  if(!files||files.length===0){
    res.innerHTML=`<div style="text-align:center;padding:40px 20px">
      <div style="font-size:28px;margin-bottom:10px">🔍</div>
      <div style="font-size:14px;color:#888;margin-bottom:6px">No results for "<strong>${escH(query)}</strong>"</div>
      <div style="font-size:12px;color:#aaa">Try a different search term or check your Drive connection</div>
    </div>`;
    return;
  }
  const MIME_ICON={"application/vnd.google-apps.document":"📄","application/vnd.google-apps.spreadsheet":"📊","application/vnd.google-apps.presentation":"📑","application/vnd.google-apps.folder":"📁","application/pdf":"📋","image/jpeg":"🖼️","image/png":"🖼️","application/postscript":"✏️","application/vnd.openxmlformats-officedocument.spreadsheetml.sheet":"📊","application/vnd.openxmlformats-officedocument.wordprocessingml.document":"📄","text/plain":"📝","video/mp4":"▶️"};
  const fmtSize=b=>{if(!b)return"";const n=parseInt(b);if(n>1048576)return(n/1048576).toFixed(1)+"MB";if(n>1024)return(n/1024).toFixed(0)+"KB";return n+"B";};
  const fmtDate=d=>{if(!d)return"";try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return"";}};
  const MIME_LABEL={"application/vnd.google-apps.document":"Google Doc","application/vnd.google-apps.spreadsheet":"Google Sheet","application/vnd.google-apps.presentation":"Slides","application/vnd.google-apps.folder":"Folder","application/pdf":"PDF","image/jpeg":"Image","image/png":"Image","text/plain":"Text"};
  res.innerHTML=`
    <div style="font-size:11px;color:#888;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <span><strong>${files.length}</strong> result${files.length!==1?"s":""} for "<strong>${escH(query)}</strong>"</span>
      <span style="font-size:10px;color:#ccc">Live from Drive</span>
    </div>
    ${files.map(f=>{
      const icon=MIME_ICON[f.mimeType]||"📄";
      const label=MIME_LABEL[f.mimeType]||"File";
      const isFolder=f.mimeType==="application/vnd.google-apps.folder";
      const url=f.viewUrl||`https://drive.google.com/open?id=${f.id}`;
      const sz=fmtSize(f.fileSize);
      const dt=fmtDate(f.modifiedTime);
      return`<a href="${url}" target="_blank" style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid #e0dfd8;border-radius:9px;background:#f9f9f7;margin-bottom:6px;cursor:pointer;text-decoration:none;color:inherit" onmouseover="this.style.background='#FFF0F0';this.style.borderColor='#F5AAAA'" onmouseout="this.style.background='#f9f9f7';this.style.borderColor='#e0dfd8'">
        <span style="font-size:22px;flex-shrink:0;margin-top:1px">${icon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:#1a1a19;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(f.title||"Untitled")}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <span style="font-size:10px;padding:1px 7px;border-radius:100px;font-weight:600;background:${isFolder?"#FFF0F0":"#f0efe8"};color:${isFolder?"#C0000A":"#555"};border:1px solid ${isFolder?"#F5AAAA":"#ddd"}">${label}</span>
            ${sz?`<span style="font-size:10px;color:#aaa">${sz}</span>`:""}
            ${dt?`<span style="font-size:10px;color:#aaa">Modified ${dt}</span>`:""}
          </div>
        </div>
        <span style="font-size:11px;color:#E8000D;flex-shrink:0;margin-top:3px">↗</span>
      </a>`;
    }).join("")}
    <div style="text-align:center;padding:10px 0 4px;font-size:11px;color:#ccc">Results from your Google Drive</div>`;
}

function previewDriveDoc(url, title, type){
  // Remove existing modal
  const existing = document.getElementById("docPreviewModal");
  if(existing) existing.remove();

  const modal = document.createElement("div");
  modal.id = "docPreviewModal";
  modal.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;flex-direction:column;padding:12px";

  const isPDF = type==="pdf" || url.includes("/file/d/");
  // Convert Google Doc edit URL to embed/preview URL
  let embedUrl = url;
  if(url.includes("docs.google.com/document")){
    embedUrl = url.replace("/edit","").replace(/\/edit.*$/,"") + "/preview";
  } else if(url.includes("drive.google.com/file")){
    const match = url.match(/\/d\/([^/]+)/);
    if(match) embedUrl = `https://drive.google.com/file/d/${match[1]}/preview`;
  }

  modal.innerHTML = `
    <div style="background:#fff;border-radius:12px;flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:900px;width:100%;margin:0 auto;max-height:100%">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #e0dfd8;background:#fafaf8;flex-shrink:0">
        <div style="font-size:13px;font-weight:600;color:#1a1a19;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:10px">${title}</div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <a href="${url}" target="_blank" style="font-size:11px;padding:4px 10px;border:1px solid #378ADD;border-radius:8px;background:#EEF5FD;color:#378ADD;text-decoration:none">Open in Drive</a>
          <button onclick="document.getElementById('docPreviewModal').remove()" style="font-size:18px;background:none;border:none;cursor:pointer;color:#888;padding:0 4px;line-height:1">✕</button>
        </div>
      </div>
      <div style="flex:1;overflow:hidden">
        <iframe src="${embedUrl}" style="width:100%;height:100%;border:none" allow="autoplay" loading="lazy"></iframe>
      </div>
    </div>`;

  modal.addEventListener("click", e=>{ if(e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}

function openDocViewer(url, title){
  const modal=document.getElementById("docViewerModal");
  const frame=document.getElementById("docViewerFrame");
  const titleEl=document.getElementById("docViewerTitle");
  const openBtn=document.getElementById("docViewerOpenBtn");
  if(!modal||!frame)return;
  // Convert Drive/Docs URLs to embeddable format
  let embedUrl=url;
  if(url.includes("docs.google.com/document")){
    embedUrl=url.replace(/\/edit.*$/,"/preview");
  } else if(url.includes("drive.google.com/file")){
    const match=url.match(/\/d\/([^/]+)/);
    if(match)embedUrl=`https://drive.google.com/file/d/${match[1]}/preview`;
  } else if(url.includes("docs.google.com/spreadsheets")){
    embedUrl=url.replace(/\/edit.*$/,"/preview");
  }
  frame.src=embedUrl;
  titleEl.textContent=title||"Document";
  openBtn.href=url;
  modal.style.display="flex";
  document.body.style.overflow="hidden";
}
function closeDocViewer(){
  const modal=document.getElementById("docViewerModal");
  const frame=document.getElementById("docViewerFrame");
  if(modal)modal.style.display="none";
  if(frame)frame.src="";
  document.body.style.overflow="";
}
